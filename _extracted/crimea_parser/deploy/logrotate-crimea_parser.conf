# Logrotate для crimea_parser. Деплоить в /etc/logrotate.d/crimea_parser
# copytruncate — не закрываем log, демоны могут писать как ни в чём не бывало.
/home/crimea_parser/parser.log
/home/crimea_parser/parser_error.log
/home/crimea_parser/email_finder.log
/home/crimea_parser/bot.log
{
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
